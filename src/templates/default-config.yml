# Origin Fortress Configuration
# Generated by 'origin-fortress init'
# Documentation: https://github.com/darfaz/origin-fortress

# Security mode: observer (read-only), worker (limited), standard (balanced), full (unrestricted)
mode: standard

# Detection settings
detection:
  prompt_injection: true      # Detect "ignore all previous instructions" patterns
  jailbreak: true            # Detect DAN-style attempts 
  pii_outbound: true         # Scan outbound messages for PII/secrets
  secret_scanning: true      # Detect API keys, tokens, credentials

# Policy enforcement
policies:
  exec:
    # Commands to block completely
    block_patterns:
      - "rm -rf /"
      - "rm -rf ~"
      - "curl * | bash"
      - "curl * | sh" 
      - "nc -e"                # reverse shells
      - "eval $(curl"          # remote code execution
    
    # Commands that require user approval
    require_approval: []
    
    # Log all exec calls
    log_all: true

  file:
    # Files to deny reading
    deny_read:
      - "~/.ssh/id_*"          # SSH keys
      - "~/.ssh/config"
      - "~/.aws/credentials"   # Cloud credentials
      - "**/.env"              # Environment files
      - "**/credentials.json"
    
    # Files to deny writing
    deny_write:
      - "/etc/*"               # System files
      - "~/.bashrc"            # Shell configs
      - "~/.ssh/authorized_keys"

  browser:
    # Domains to block (empty = allow all)
    block_domains: []
    
    # Log all browser activity
    log_all: true

# Alert configuration
alerts:
  # Minimum severity to alert on: low, medium, high, critical
  severity_threshold: medium
  
  # Webhook URL for alerts (optional)
  # webhook: https://hooks.slack.com/services/YOUR/WEBHOOK/URL
  
  # Email alerts (optional)  
  # email: security@example.com
  
  # Telegram bot alerts (optional)
  # telegram:
  #   bot_token: "YOUR_BOT_TOKEN"
  #   chat_id: "YOUR_CHAT_ID"

# Optional: Origin Fortress Cloud integration
cloud:
  enabled: false
  # api_key: YOUR_API_KEY